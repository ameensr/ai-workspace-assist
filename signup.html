<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Qaly AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center lg:justify-end p-6 lg:pr-32 relative overflow-hidden">
    

    <div class="max-w-md w-full bg-white/80 backdrop-blur-sm rounded-2xl shadow-2xl p-8 relative z-10 transition-all duration-500 hover:shadow-blue-200/50 border border-white/20">
        <div class="flex items-center justify-center gap-3 mb-4">
            <div class="qaly-logo text-4xl tracking-tighter flex items-center">
                <span class="text-gradient-q">Q</span>aly
                <span class="logo-sparkle"></span>
            </div>
            <div class="ml-1 border-l-2 border-slate-200 pl-3">
                <h1 class="text-xl font-bold text-slate-400 uppercase tracking-widest leading-none">AI</h1>
            </div>
        </div>

        <h2 class="text-3xl font-bold text-center mb-2">Create Account</h2>
        <p class="text-slate-500 text-center font-medium mb-8">Test Smarter. Ship Faster.</p>

        <form onsubmit="handleSignup(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
                <input id="full-name" type="text" required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="John Doe">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                <input id="email" type="email" required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="name@company.com">
            </div>

            <div class="relative group">
                <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all pr-12"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePassword()" 
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition-colors p-1 rounded-md hover:bg-slate-100 flex items-center justify-center">
                        <span id="password-icon" class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors">
                Create Account
            </button>
            <div id="signup-message" class="text-sm text-center hidden font-medium"></div>
        </form>

        <p class="text-center mt-6 text-sm text-slate-600">
            Already have an account? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Sign
                In</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script>
        async function handleSignup(e) {
            e.preventDefault();
            const fullName = document.getElementById('full-name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('signup-message');
            message.classList.add('hidden');
            message.classList.remove('text-red-600', 'text-green-600');

            try {
                await window.signup(email, password, fullName);
                message.textContent = 'Account created. Please verify your email, then sign in.';
                message.classList.add('text-green-600');
                message.classList.remove('hidden');
            } catch (error) {
                message.textContent = error.message || 'Could not create account.';
                message.classList.add('text-red-600');
                message.classList.remove('hidden');
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('password-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
                icon.classList.add('text-blue-600');
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
                icon.classList.remove('text-blue-600');
            }
        }

        // Initialize Footer
        function initFooter() {
            const footer = document.getElementById('main-footer');
            if (footer && typeof appConfig !== 'undefined' && appConfig.footer) {
                footer.innerHTML = appConfig.footer.text;
                if (appConfig.footer.link && appConfig.footer.enableLink) {
                    footer.style.cursor = 'pointer';
                    footer.title = 'Click to visit';
                    footer.onclick = () => window.open(appConfig.footer.link, '_blank');
                }
            }
        }
        window.addEventListener('DOMContentLoaded', initFooter);
    </script>
    <footer id="main-footer" class="app-footer">
        <!-- Text injected from config.js -->
    </footer>
</body>

</html>
