<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Qaly AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        (function () {
            try {
                const theme = (localStorage.getItem('qaly_theme') || 'light').toLowerCase() === 'dark' ? 'dark' : 'light';
                document.documentElement.classList.remove('light', 'dark');
                document.documentElement.classList.add(theme);
            } catch (_) {}
        })();
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(1200px 600px at 10% -10%, #c7d2fe 0%, #bcd8ff 40%, #d9eefc 100%);
        }
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(243, 247, 255, 0.92));
            box-shadow: 0 30px 80px -45px rgba(15, 23, 42, 0.45);
        }
        .floaty {
            animation: floatY 5s ease-in-out infinite;
        }
        .floaty-delayed {
            animation: floatY 6s ease-in-out 0.9s infinite;
        }
        @keyframes floatY {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .game-canvas {
            image-rendering: crisp-edges;
            cursor: pointer;
            background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        }
        html.dark body {
            background: radial-gradient(1200px 600px at 10% -10%, #0f172a 0%, #111827 50%, #1e293b 100%);
            color: #e2e8f0;
        }
        html.dark .glass-card {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(17, 24, 39, 0.96));
            border-color: rgba(51, 65, 85, 0.9);
        }
        html.dark .game-canvas {
            background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
            border-color: #334155 !important;
        }
        html.dark .text-slate-800,
        html.dark .text-slate-700,
        html.dark .text-slate-600,
        html.dark .text-slate-500,
        html.dark .text-slate-400 {
            color: #cbd5e1 !important;
        }
        html.dark .bg-white\/95,
        html.dark .bg-white\/90,
        html.dark .bg-white\/80,
        html.dark .bg-white\/45 {
            background: rgba(17, 24, 39, 0.92) !important;
        }
        html.dark .border-slate-200,
        html.dark .border-indigo-100,
        html.dark .border-white\/80,
        html.dark .border-indigo-200\/70 {
            border-color: #334155 !important;
        }
    </style>
</head>
<body class="min-h-screen px-4 py-10 text-slate-800 sm:px-8">
    <div class="mx-auto flex min-h-[88vh] max-w-6xl items-center justify-center">
        <main class="glass-card relative w-full overflow-hidden rounded-[2.25rem] border border-white/80 p-6 sm:p-10 lg:p-14">
            <div class="pointer-events-none absolute -left-6 top-24 h-16 w-16 rounded-full bg-emerald-200/70 blur-[1px] floaty"></div>
            <div class="pointer-events-none absolute -right-4 bottom-10 h-20 w-20 rounded-full bg-amber-200/80 blur-[1px] floaty-delayed"></div>
            <div class="pointer-events-none absolute right-[18%] top-[62%] h-10 w-10 rounded-full border-4 border-indigo-200/70"></div>

            <div class="mx-auto mb-10 flex max-w-sm items-center justify-center">
                <div class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white/95 px-4 py-2 shadow-sm">
                    <span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-blue-600 text-xs font-bold text-white">Q</span>
                    <p class="text-xs font-bold tracking-wide text-slate-700">Qaly Ai</p>
                </div>
            </div>

            <section class="mx-auto max-w-3xl text-center">
                <p class="mb-4 text-xs font-black uppercase tracking-[0.24em] text-slate-500">We're Still Building</p>
                <h1 id="coming-soon-heading" class="mb-4 text-4xl font-extrabold tracking-tight text-blue-700 sm:text-5xl lg:text-6xl">
                    Cooking This Page.
                </h1>
                <p id="coming-soon-subtitle" class="mx-auto max-w-2xl text-base leading-relaxed text-slate-600 sm:text-lg">
                    We are crafting this experience to make QA workflows faster, sharper, and more delightful.
                </p>

                <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
                    <a href="index.html"
                        class="inline-flex items-center gap-2 rounded-full bg-slate-900 px-6 py-3 text-sm font-bold text-white shadow-[0_16px_30px_-18px_rgba(15,23,42,0.9)] transition-all duration-300 hover:-translate-y-0.5 hover:bg-slate-800">
                        <span class="text-base">←</span>
                        Back to Dashboard
                    </a>
                    <button type="button"
                        class="inline-flex items-center gap-2 rounded-full border border-indigo-100 bg-white/95 px-6 py-3 text-sm font-bold text-indigo-700 shadow-sm transition-all duration-300 hover:bg-indigo-50"
                        aria-label="Notify me soon">
                        <span>✉️</span>
                        Notify Me
                    </button>
                </div>
            </section>

            <section class="mx-auto mt-12 max-w-2xl">
                <div class="rounded-2xl border border-white/80 bg-white/80 p-4 shadow-[0_18px_40px_-28px_rgba(37,99,235,0.8)] backdrop-blur">
                    <div class="mb-3 flex items-center justify-between">
                        <p class="text-[11px] font-black uppercase tracking-[0.16em] text-slate-400">Mini Game</p>
                        <p class="text-[11px] font-black uppercase tracking-[0.16em] text-slate-400">Score: <span id="scoreDisplay">00</span></p>
                    </div>
                    <div class="relative">
                        <canvas id="gameCanvas" width="700" height="130" class="game-canvas w-full rounded-xl border border-slate-200"></canvas>
                        <div id="gameOverlay"
                            class="absolute inset-0 flex items-center justify-center rounded-xl bg-white/45 backdrop-blur-[1px] transition-opacity">
                            <span class="rounded-full border border-slate-200 bg-white/90 px-4 py-2 text-[10px] font-black uppercase tracking-widest text-slate-500">
                                Click Canvas or Press Space
                            </span>
                        </div>
                    </div>
                    <div class="mt-3 flex items-center justify-between text-[11px] text-slate-500">
                        <p>Jump over blocks. Survive as long as possible.</p>
                        <p class="font-bold">High Score: <span id="highScore">0</span></p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const pageName = params.get('page');
        if (pageName) {
            const heading = document.getElementById('coming-soon-heading');
            const subtitle = document.getElementById('coming-soon-subtitle');
            heading.textContent = `Cooking ${pageName}.`;
            subtitle.textContent = `${pageName} is under construction. We are shaping it into something clean, useful, and fun.`;
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('gameOverlay');
        const scoreEl = document.getElementById('scoreDisplay');
        const highScoreEl = document.getElementById('highScore');

        let isRunning = false;
        let score = 0;
        let highScore = Number(localStorage.getItem('qaly_dash_score') || 0);
        highScoreEl.textContent = highScore;

        const player = {
            x: 90,
            y: 95,
            size: 16,
            dy: 0,
            jump: -8.4,
            gravity: 0.45
        };

        let obstacles = [];
        let frame = 0;

        function init() {
            obstacles = [];
            score = 0;
            frame = 0;
            player.y = 95;
            player.dy = 0;
            scoreEl.textContent = '00';
            isRunning = true;
            overlay.style.opacity = '0';
            animate();
        }

        function jump() {
            if (!isRunning) {
                init();
                return;
            }
            const floor = canvas.height - player.size - 18;
            if (player.y >= floor - 0.1) {
                player.dy = player.jump;
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            jump();
        });

        function drawInitial() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(16, canvas.height - 18);
            ctx.lineTo(canvas.width - 16, canvas.height - 18);
            ctx.stroke();

            ctx.fillStyle = '#2563eb';
            ctx.beginPath();
            ctx.arc(player.x, canvas.height - 18 - player.size / 2, player.size / 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function animate() {
            if (!isRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(16, canvas.height - 18);
            ctx.lineTo(canvas.width - 16, canvas.height - 18);
            ctx.stroke();

            player.dy += player.gravity;
            player.y += player.dy;
            const floor = canvas.height - player.size - 18;
            if (player.y > floor) {
                player.y = floor;
                player.dy = 0;
            }

            ctx.fillStyle = '#2563eb';
            ctx.beginPath();
            ctx.arc(player.x, player.y + player.size / 2, player.size / 2, 0, Math.PI * 2);
            ctx.fill();

            if (frame % 75 === 0) {
                obstacles.push({
                    x: canvas.width,
                    w: 14 + Math.random() * 6,
                    h: 16 + Math.random() * 18
                });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                o.x -= 6;

                ctx.fillStyle = '#94a3b8';
                ctx.fillRect(o.x, canvas.height - 18 - o.h, o.w, o.h);

                const px = player.x;
                const py = player.y + player.size / 2;
                if (
                    px + player.size / 2 > o.x &&
                    px - player.size / 2 < o.x + o.w &&
                    py + player.size / 2 > canvas.height - 18 - o.h
                ) {
                    gameOver();
                }

                if (o.x < -25) {
                    obstacles.splice(i, 1);
                    score += 1;
                    scoreEl.textContent = score.toString().padStart(2, '0');
                }
            }

            frame += 1;
            requestAnimationFrame(animate);
        }

        function gameOver() {
            isRunning = false;
            overlay.style.opacity = '1';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('qaly_dash_score', String(highScore));
                highScoreEl.textContent = String(highScore);
            }
        }

        drawInitial();
    </script>
</body>
</html>
