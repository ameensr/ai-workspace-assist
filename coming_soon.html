<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qaly AI - Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-20px); } 
        }
        canvas {
            image-rendering: pixelated;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
        }
        .game-overlay {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white p-6 relative">
    
    <div class="max-w-2xl w-full text-center relative z-10 transition-all duration-500" id="main-content">
        <div class="mb-4 animate-float inline-block">
            <div class="w-20 h-20 bg-blue-500/20 rounded-2xl flex items-center justify-center border border-blue-500/30">
                <span class="material-symbols-outlined text-4xl text-blue-400">rocket_launch</span>
            </div>
        </div>
        
        <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight mb-2 bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
            Something smarter is loading…
        </h1>
        <p class="text-slate-400 mb-8 font-medium" id="feature-subtitle">Built by a legend in progress</p>
        
        <div class="glass-card p-8 rounded-3xl mb-8 relative group overflow-hidden">
            <div class="flex items-center justify-between mb-4 px-2">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Bored? Try a Jump</span>
                </div>
                <div class="text-[10px] font-bold text-blue-400 uppercase tracking-widest" id="high-score-display">High Score: 0</div>
            </div>

            <div class="relative">
                <canvas id="gameCanvas" width="600" height="200" class="w-full h-auto"></canvas>
                
                <!-- Game Over Overlay -->
                <div id="game-over" class="absolute inset-0 game-overlay rounded-xl flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
                    <h2 class="text-2xl font-black mb-1">GAME OVER</h2>
                    <p class="text-slate-400 text-sm mb-4" id="final-score">Score: 0</p>
                    <button onclick="resetGame()" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-full text-xs font-bold transition-all transform hover:scale-105">
                        TRY AGAIN
                    </button>
                </div>

                <!-- Start Overlay -->
                <div id="game-start" class="absolute inset-0 game-overlay rounded-xl flex flex-col items-center justify-center transition-opacity duration-300">
                    <button onclick="startGame()" class="w-16 h-16 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center transition-all group shadow-2xl border border-white/5">
                        <span class="material-symbols-outlined text-3xl text-white transform group-hover:scale-125 transition-transform">play_arrow</span>
                    </button>
                    <p class="mt-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Space or Click to Jump</p>
                </div>
            </div>
        </div>

        <div class="flex gap-4 justify-center">
            <button onclick="window.location.href='index.html'" class="px-6 py-2.5 bg-white text-slate-900 rounded-xl font-bold text-xs hover:bg-slate-100 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Dashboard
            </button>
            <div class="px-6 py-2.5 bg-white/5 border border-white/10 rounded-xl text-slate-400 font-bold text-xs backdrop-blur-sm">
                Expected: Soon
            </div>
        </div>
    </div>

    <!-- Decorative blobs -->
    <div class="absolute top-1/4 -left-10 w-64 h-64 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 -right-10 w-96 h-96 bg-indigo-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <script>
        // Parse feature name
        const urlParams = new URLSearchParams(window.location.search);
        const feature = urlParams.get('page');
        if (feature) {
            document.getElementById('feature-title').textContent = `${feature} is loading…`;
            document.title = `Qaly AI - ${feature} Loading`;
        }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gameOverEl = document.getElementById('game-over');
        const gameStartEl = document.getElementById('game-start');
        const finalScoreEl = document.getElementById('final-score');
        const highScoreEl = document.getElementById('high-score-display');

        let isPlaying = false;
        let score = 0;
        let highScore = localStorage.getItem('qaly_jump_highscore') || 0;
        highScoreEl.textContent = `High Score: ${highScore}`;

        // Player
        let player = {
            x: 50,
            y: 140,
            width: 28,
            height: 28,
            dy: 0,
            gravity: 0.7,
            jumpPower: -11,
            grounded: true,
            color: '#ffffff'
        };

        // Obstacles
        let obstacles = [];
        let gameSpeed = 5;
        let spawnTimer = 0;

        function startGame() {
            isPlaying = true;
            gameStartEl.style.opacity = '0';
            gameStartEl.style.display = 'none';
            resetGameParams();
            gameLoop();
        }

        function resetGameParams() {
            score = 0;
            gameSpeed = 5;
            obstacles = [];
            player.y = 140;
            player.dy = 0;
            player.grounded = true;
            spawnTimer = 0;
        }

        function resetGame() {
            gameOverEl.style.opacity = '0';
            gameOverEl.style.display = 'none';
            resetGameParams();
            isPlaying = true;
            gameLoop();
        }

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                if (!isPlaying && gameStartEl.style.display !== 'none') startGame();
                else if (!isPlaying && gameOverEl.style.display !== 'none') resetGame();
                else jump();
            }
        });

        canvas.addEventListener("mousedown", () => {
             if (isPlaying) jump();
        });

        function jump() {
            if (player.grounded) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }
        }

        function spawnObstacle() {
            const h = 20 + Math.random() * 40;
            obstacles.push({
                x: canvas.width,
                y: canvas.height - h - 20,
                width: 15,
                height: h
            });
        }

        function update() {
            if (!isPlaying) return;

            // Player physics
            player.dy += player.gravity;
            player.y += player.dy;

            const groundY = canvas.height - player.height - 20;
            if (player.y >= groundY) {
                player.y = groundY;
                player.dy = 0;
                player.grounded = true;
            }

            // Spawn obstacles
            spawnTimer++;
            if (spawnTimer > Math.max(50, 120 - (score * 0.4))) {
                spawnObstacle();
                spawnTimer = 0;
            }

            // Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // Collision Detection
                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    endGame();
                    return;
                }

                if (obs.x < -20) {
                    obstacles.splice(i, 1);
                    score++;
                    if (score % 10 === 0) gameSpeed += 0.3;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground line
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 20);
            ctx.lineTo(canvas.width, canvas.height - 20);
            ctx.stroke();

            // Player (Classy Glow)
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(255, 255, 255, 0.5)";
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;

            // Obstacles (Minimal Bars)
            obstacles.forEach(obs => {
                ctx.fillStyle = "rgba(255, 255, 255, 0.25)";
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            // Score (Minimal)
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.font = "800 10px 'Inter'";
            ctx.textAlign = "right";
            ctx.fillText(score, canvas.width - 10, 20);
        }

        function endGame() {
            isPlaying = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('qaly_jump_highscore', highScore);
                highScoreEl.textContent = `High Score: ${highScore}`;
            }
            finalScoreEl.textContent = `Score: ${score}`;
            gameOverEl.style.display = 'flex';
            setTimeout(() => gameOverEl.style.opacity = '1', 10);
        }

        function gameLoop() {
            if (!isPlaying) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
