<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Qaly AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
        }
        .game-canvas {
            image-rendering: crisp-edges;
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-slate-800">

    <!-- Main Content -->
    <div class="flex flex-col items-center text-center max-w-md w-full animate-in fade-in duration-700">
        <!-- Creative Animated Element -->
        <div class="relative w-16 h-16 mb-8 flex items-center justify-center">
            <div class="absolute inset-0 bg-blue-500/10 rounded-full animate-ping"></div>
            <div class="absolute inset-2 bg-blue-500/20 rounded-full animate-pulse"></div>
            <svg class="w-8 h-8 text-blue-600 relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </div>
        
        <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 mb-2">
            Something better is on the way
        </h1>
        <p class="text-slate-500 mb-8 text-sm leading-relaxed">
            We’re building this feature to make your QA smarter.
        </p>

        <a href="index.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-slate-900 text-white rounded-full text-xs font-semibold hover:bg-slate-800 transition-all shadow-sm mb-16">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Back to Dashboard
        </a>

        <!-- Minimal Mini Game -->
        <div class="w-full flex flex-col items-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 opacity-60">
                Bored? Try this ↓
            </p>
            
            <div class="relative group bg-slate-100/50 rounded-xl p-1 border border-slate-200/60 transition-all hover:bg-slate-100">
                <canvas id="gameCanvas" width="280" height="80" class="game-canvas rounded-lg"></canvas>
                
                <div id="gameOverlay" class="absolute inset-0 flex items-center justify-center bg-slate-100/40 backdrop-blur-[1px] opacity-100 transition-opacity pointer-events-none">
                    <span class="text-[9px] font-bold text-slate-400 uppercase">Click or Space to Start</span>
                </div>
                
                <div class="absolute top-2 right-3 text-[10px] font-mono text-slate-400" id="scoreDisplay">
                    00
                </div>
            </div>
            
            <p class="mt-4 text-[9px] text-slate-400 italic">High Score: <span id="highScore">0</span></p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('gameOverlay');
        const scoreEl = document.getElementById('scoreDisplay');
        const highScoreEl = document.getElementById('highScore');

        let isRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('qaly_dash_score') || 0;
        highScoreEl.textContent = highScore;

        const player = {
            x: 40,
            y: 50,
            size: 6,
            dy: 0,
            jump: -4.5,
            gravity: 0.28,
            grounded: false
        };

        let obstacles = [];
        let frame = 0;

        function init() {
            obstacles = [];
            score = 0;
            player.y = 50;
            player.dy = 0;
            scoreEl.textContent = '00';
            isRunning = true;
            overlay.style.opacity = '0';
            animate();
        }

        function jump() {
            if (!isRunning) {
                init();
                return;
            }
            if (player.y >= canvas.height - player.size - 10) {
                player.dy = player.jump;
            }
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); jump(); });

        function animate() {
            if (!isRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Ground
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(10, canvas.height - 10);
            ctx.lineTo(canvas.width - 10, canvas.height - 10);
            ctx.stroke();

            // Player (Dot)
            player.dy += player.gravity;
            player.y += player.dy;

            const floor = canvas.height - player.size - 10;
            if (player.y > floor) {
                player.y = floor;
                player.dy = 0;
            }

            ctx.fillStyle = '#64748b';
            ctx.beginPath();
            ctx.arc(player.x, player.y + player.size/2, player.size/2, 0, Math.PI * 2);
            ctx.fill();

            // Obstacles
            if (frame % 85 === 0) {
                obstacles.push({ x: canvas.width, w: 8, h: 10 + Math.random() * 15 });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                o.x -= 3;

                ctx.fillStyle = '#cbd5e1';
                ctx.fillRect(o.x, canvas.height - 10 - o.h, o.w, o.h);

                // Collision
                const px = player.x;
                const py = player.y + player.size/2;
                if (px + player.size/2 > o.x && px - player.size/2 < o.x + o.w &&
                    py + player.size/2 > canvas.height - 10 - o.h) {
                    gameOver();
                }

                if (o.x < -10) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.textContent = score.toString().padStart(2, '0');
                }
            }

            frame++;
            requestAnimationFrame(animate);
        }

        function gameOver() {
            isRunning = false;
            overlay.style.opacity = '1';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('qaly_dash_score', highScore);
                highScoreEl.textContent = highScore;
            }
        }

        // Draw initial state
        ctx.strokeStyle = '#e2e8f0';
        ctx.beginPath();
        ctx.moveTo(10, canvas.height - 10);
        ctx.lineTo(canvas.width - 10, canvas.height - 10);
        ctx.stroke();
        ctx.fillStyle = '#64748b';
        ctx.beginPath();
        ctx.arc(player.x, canvas.height - 10 - player.size/2, player.size/2, 0, Math.PI * 2);
        ctx.fill();

    </script>
</body>
</html>
