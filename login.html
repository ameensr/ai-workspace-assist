<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QA Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-slate-100 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center">
                <span class="material-symbols-outlined text-white">architecture</span>
            </div>
            <h1 class="text-2xl font-bold">QA Architect</h1>
        </div>

        <h2 class="text-3xl font-bold text-center mb-2">Welcome Back</h2>
        <p class="text-slate-600 text-center mb-8">Sign in to access your AI workspace</p>

        <form onsubmit="handleLogin(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="name@company.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors">
                Sign In
            </button>
            <div id="error-message" class="text-red-600 text-sm text-center hidden">Invalid login credentials</div>
        </form>

        <p class="text-center mt-6 text-sm text-slate-600">
            Don't have an account? <a href="signup.html" class="text-blue-600 font-semibold hover:underline">Sign Up</a>
        </p>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            if (window.login(email, password)) {
                window.location.href = 'index.html';
            } else {
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
</body>

</html>
