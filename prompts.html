<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qaly AI - Master Prompt Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc;
        }
        .prompt-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .prompt-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: #3b82f6;
        }
        .category-pill {
            background: rgba(59, 130, 246, 0.1);
            color: #2563eb;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            transform: translateY(200%);
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body class="p-4 sm:p-10">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col sm:flex-row items-center justify-between mb-12 bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
            <div class="mb-4 sm:mb-0">
                <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-slate-400 hover:text-blue-600 mb-2 transition-all group">
                    <span class="material-symbols-outlined text-sm transform group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    <span class="text-[10px] font-black uppercase tracking-[0.2em]">Dashboard</span>
                </button>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Master Prompt Library</h1>
                <p class="text-slate-500 mt-1 text-sm font-medium">Curated high-performance prompts for professional QA workflows.</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:block text-right">
                    <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Assets</div>
                    <div class="text-2xl font-black text-blue-600" id="assets-count">0</div>
                </div>
                <div class="h-10 w-px bg-slate-200 hidden sm:block"></div>
                <div class="bg-indigo-600 text-white px-6 py-2.5 rounded-2xl text-xs font-black uppercase tracking-wider shadow-xl shadow-indigo-100 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">verified</span>
                    PRO CONTENT
                </div>
            </div>
        </header>

        <!-- Search & Filter -->
        <div class="mb-10 flex flex-col sm:flex-row gap-4">
            <div class="relative flex-grow">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input type="text" id="search-input" placeholder="Search prompts, categories, or tags..." 
                    class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all text-sm">
            </div>
            <div class="flex gap-2">
                 <button class="px-6 py-4 bg-white border border-slate-200 rounded-2xl text-xs font-bold text-slate-600 hover:bg-slate-50 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">filter_list</span>
                    All Categories
                </button>
            </div>
        </div>

        <!-- Prompt Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="prompt-grid">
            <!-- Dynamically populated -->
        </div>

        <!-- Toast -->
        <div id="toast" class="toast shadow-2xl flex items-center gap-2">
            <span class="material-symbols-outlined text-green-400">check_circle</span>
            Copied to Clipboard!
        </div>
    </div>

    <script src="prompts.js"></script>
    <script>
        const grid = document.getElementById('prompt-grid');
        const searchInput = document.getElementById('search-input');
        const countEl = document.getElementById('assets-count');
        const toastEl = document.getElementById('toast');

        function showToast() {
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 3000);
        }

        function copyPrompt(text) {
            navigator.clipboard.writeText(text).then(showToast);
        }

        function renderPrompts(filter = '') {
            const list = MASTER_PROMPTS_LIBRARY;
            const filtered = list.filter(p => 
                p.title.toLowerCase().includes(filter.toLowerCase()) || 
                p.category.toLowerCase().includes(filter.toLowerCase()) ||
                p.description.toLowerCase().includes(filter.toLowerCase())
            );

            countEl.textContent = filtered.length;
            grid.innerHTML = filtered.map(p => `
                <div class="prompt-card bg-white p-6 rounded-3xl flex flex-col group">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center transition-colors group-hover:bg-blue-600 group-hover:text-white">
                            <span class="material-symbols-outlined">${p.icon}</span>
                        </div>
                        <div class="flex-grow">
                            <div class="text-[9px] font-black text-blue-600 uppercase tracking-widest mb-0.5">${p.category}</div>
                            <h3 class="font-bold text-slate-900 leading-tight">${p.title}</h3>
                        </div>
                    </div>
                    
                    <p class="text-xs text-slate-500 mb-6 leading-relaxed font-medium">
                        ${p.description}
                    </p>

                    <div class="mt-auto pt-6 border-t border-slate-50 flex items-center justify-between">
                        <button onclick="copyPrompt(\`${p.prompt.replace(/`/g, '\\`')}\`)" 
                            class="flex items-center gap-2 text-[10px] font-black text-slate-900 uppercase tracking-widest hover:text-blue-600 transition-colors">
                            <span class="material-symbols-outlined text-sm">content_copy</span>
                            Copy Prompt
                        </button>
                        <div class="p-1.5 rounded-lg bg-slate-50 text-slate-400">
                             <span class="material-symbols-outlined text-[16px]">info</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => renderPrompts(e.target.value));

        // Initial render
        document.addEventListener('DOMContentLoaded', () => renderPrompts());
    </script>
</body>
</html>
