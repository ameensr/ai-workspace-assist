<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Qaly AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full rounded-2xl border border-slate-200 bg-white p-8 shadow-xl">
        <h1 class="text-2xl font-bold text-slate-900 text-center mb-2">Set New Password</h1>
        <p class="text-sm text-slate-500 text-center mb-6">Enter your new password to complete recovery.</p>

        <form id="reset-form" class="space-y-4">
            <div>
                <label for="new-password" class="block text-sm font-medium text-slate-700 mb-2">New Password</label>
                <input id="new-password" type="password" minlength="6" required class="w-full rounded-lg border border-slate-300 px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="At least 6 characters">
            </div>
            <div>
                <label for="confirm-password" class="block text-sm font-medium text-slate-700 mb-2">Confirm Password</label>
                <input id="confirm-password" type="password" minlength="6" required class="w-full rounded-lg border border-slate-300 px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Repeat password">
            </div>
            <button type="submit" class="w-full rounded-lg bg-blue-600 py-3 font-bold text-white hover:bg-blue-700 transition-colors">Update Password</button>
            <div id="reset-error" class="hidden text-sm text-center font-medium text-red-600"></div>
            <div id="reset-success" class="hidden text-sm text-center font-medium text-green-600"></div>
        </form>

        <p class="mt-6 text-center text-sm text-slate-600">
            Back to <a href="login.html" class="font-semibold text-blue-600 hover:underline">Sign In</a>
        </p>
    </div>

    <script src="/runtime-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script>
        async function handleResetPassword(event) {
            event.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('reset-error');
            const successDiv = document.getElementById('reset-success');
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match.';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                await window.updatePassword(newPassword);
                successDiv.textContent = 'Password updated successfully. Redirecting to login...';
                successDiv.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1200);
            } catch (error) {
                errorDiv.textContent = error.message || 'Failed to update password.';
                errorDiv.classList.remove('hidden');
            }
        }

        document.getElementById('reset-form').addEventListener('submit', handleResetPassword);
    </script>
</body>
</html>
